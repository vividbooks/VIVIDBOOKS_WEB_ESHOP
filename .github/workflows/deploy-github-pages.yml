# Nasazení na GitHub Pages (project site: /VIVIDBOOKS_WEB_ESHOP/)
# V repozitáři: Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_ACTIONS: 'true'

      - name: SPA fallback (refresh na /predmet/… atd.)
        run: cp build/index.html build/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
