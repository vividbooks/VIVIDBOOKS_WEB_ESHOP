# Nasazení na GitHub Pages (project site: /VIVIDBOOKS_WEB_ESHOP/)
# V repozitáři: Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  # Po přidání / změně Actions secrets spusťte znovu nasazení bez nového commitu:
  # Actions → „Deploy GitHub Pages“ → Run workflow.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # VITE_* musí být dostupné celému jobu (vite build je citlivý na process.env při startu).
    env:
      GITHUB_ACTIONS: 'true'
      VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
      VITE_PACKETA_API_KEY: ${{ secrets.VITE_PACKETA_API_KEY }}
      VITE_TWITTER_SITE: ${{ secrets.VITE_TWITTER_SITE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      # Zkontroluje, zda GitHub Actions opravdu předává neprázdné hodnoty (nic z tajemství nevypisujeme).
      - name: Verify VITE secrets reach the runner
        run: |
          if [ -n "${VITE_PACKETA_API_KEY:-}" ]; then
            echo "::notice::VITE_PACKETA_API_KEY je v běhu k dispozici (zabalí se do buildu)."
          else
            echo "::error::VITE_PACKETA_API_KEY je v tomto běhu PRÁZDNÝ — do JS se neuloží a na webu uvidíte chybu widgetu."
            echo "::error::Zkontrolujte: název repository secretu přesně VITE_PACKETA_API_KEY (bez mezer). Po uložení secretu znovu spusťte tento workflow (Run workflow). V Settings → Pages musí být zdroj „GitHub Actions“, ne deploy z větve."
          fi
          if [ -n "${VITE_STRIPE_PUBLISHABLE_KEY:-}" ]; then
            echo "::notice::VITE_STRIPE_PUBLISHABLE_KEY je v běhu k dispozici."
          else
            echo "::error::VITE_STRIPE_PUBLISHABLE_KEY je PRÁZDNÝ — Stripe na Pages nebude fungovat."
          fi

      # Repository secrets: Settings → Secrets and variables → Actions
      - name: Build
        run: npm run build

      - name: SPA fallback (refresh na /predmet/… atd.)
        run: cp build/index.html build/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
