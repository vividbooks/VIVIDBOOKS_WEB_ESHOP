# Nasazení na GitHub Pages. Vlastní doména (např. new.vividbooks.com) = kořen webu → Vite base musí být /.
# GITHUB_PAGES_ROOT_BASE vypíná /VIVIDBOOKS_WEB_ESHOP/ z publicPath (jinak 404 na custom domain).
# V repozitáři: Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  # Po přidání / změně Actions secrets spusťte znovu nasazení bez nového commitu:
  # Actions → „Deploy GitHub Pages“ → Run workflow.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # VITE_* musí být dostupné celému jobu (vite build je citlivý na process.env při startu).
    env:
      GITHUB_ACTIONS: 'true'
      GITHUB_PAGES_ROOT_BASE: 'true'
      NODE_OPTIONS: --max-old-space-size=6144
      VITE_PUBLIC_SITE_URL: ${{ secrets.VITE_PUBLIC_SITE_URL }}
      VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
      VITE_PACKETA_API_KEY: ${{ secrets.VITE_PACKETA_API_KEY }}
      VITE_TWITTER_SITE: ${{ secrets.VITE_TWITTER_SITE }}
      VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install
        run: npm ci

      # Zkontroluje, zda GitHub Actions opravdu předává neprázdné hodnoty (nic z tajemství nevypisujeme).
      - name: Verify VITE secrets reach the runner
        run: |
          if [ -n "${VITE_PACKETA_API_KEY:-}" ]; then
            echo "::notice::VITE_PACKETA_API_KEY je v běhu k dispozici (zabalí se do buildu)."
          else
            echo "::warning::VITE_PACKETA_API_KEY je prázdný — doplňte repository secret (přesný název) a znovu spusťte workflow; Packeta na Pages nemusí fungovat."
          fi
          if [ -n "${VITE_STRIPE_PUBLISHABLE_KEY:-}" ]; then
            echo "::notice::VITE_STRIPE_PUBLISHABLE_KEY je v běhu k dispozici."
          else
            echo "::warning::VITE_STRIPE_PUBLISHABLE_KEY je prázdný — Stripe na Pages nemusí fungovat; doplňte repository secret."
          fi
          if [ -n "${VITE_PUBLIC_SITE_URL:-}" ]; then
            echo "::notice::VITE_PUBLIC_SITE_URL je v běhu k dispozici (${VITE_PUBLIC_SITE_URL})."
          else
            echo "::warning::VITE_PUBLIC_SITE_URL je prázdný — canonical a sdílené URL spadnou na fallback z kódu. Pro migraci domény nastavte repository secret."
          fi
          if [ -n "${VITE_GA_MEASUREMENT_ID:-}" ]; then
            echo "::notice::VITE_GA_MEASUREMENT_ID je v běhu k dispozici (GA4 v buildu)."
          else
            echo "::notice::VITE_GA_MEASUREMENT_ID je prázdný — GA4 se do statického buildu nezahrne (volitelné)."
          fi

      # Repository secrets: Settings → Secrets and variables → Actions
      - name: Build
        run: npm run build

      - name: SPA fallback (refresh na /predmet/… atd.)
        run: cp build/index.html build/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Wait if another Pages deployment is still running
        run: |
          for attempt in 1 2 3 4 5 6 7 8; do
            status="$(gh api "repos/${GITHUB_REPOSITORY}/pages/deployments" --jq '.[0].status // empty' 2>/dev/null || true)"
            if [ -z "$status" ] || [ "$status" = "success" ] || [ "$status" = "failure" ]; then
              echo "Pages deployment ready (status=${status:-none})."
              exit 0
            fi
            echo "Pages deployment status=${status} — waiting 30s (${attempt}/8)…"
            sleep 30
          done
          echo "Timed out waiting for prior Pages deployment; attempting deploy anyway."
        env:
          GH_TOKEN: ${{ github.token }}

      - id: deploy
        uses: actions/deploy-pages@v4
